<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#10151c">
<title>津山の天気</title>
<style>
:root{
  --bg:#10151c;
  --panel:#181f29;
  --line:#2a3340;
  --ink:#eef1f5;
  --mute:#7c8a9a;
  --accent:#ffb454;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:-apple-system,"Hiragino Sans","Yu Gothic",system-ui,sans-serif;
  min-height:100vh;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
main{
  max-width:480px;
  margin:0 auto;
  padding:0 0 32px;
  min-height:100vh;
}

.head{
  padding:28px 20px 20px;
  text-align:center;
}
.head .place{
  font-size:.82rem;
  letter-spacing:.12em;
  color:var(--mute);
  margin-bottom:2px;
}
.head .updated{
  font-size:.68rem;
  color:var(--mute);
  opacity:.7;
}

.now{
  padding:8px 20px 24px;
  text-align:center;
}
.now .icon{
  width:84px;height:84px;
  margin:0 auto 4px;
}
.now .temp{
  font-size:5rem;
  font-weight:700;
  line-height:1;
  letter-spacing:-.02em;
  font-variant-numeric:tabular-nums;
}
.now .temp span{
  font-size:2rem;
  font-weight:400;
  color:var(--mute);
  vertical-align:top;
  margin-left:2px;
}
.now .desc{
  font-size:1.05rem;
  color:var(--mute);
  margin-top:6px;
}
.now .rain{
  display:inline-flex;
  align-items:center;
  gap:6px;
  margin-top:10px;
  padding:6px 14px;
  border-radius:20px;
  font-size:.85rem;
  font-weight:600;
}

#status{
  text-align:center;
  font-size:.82rem;
  color:var(--mute);
  padding:14px 20px;
  display:none;
}
#status.show{display:block}
#status.err{color:#ff8a5c}

.legend{
  display:flex;
  justify-content:center;
  gap:16px;
  padding:0 20px 18px;
  font-size:.68rem;
  color:var(--mute);
}
.legend span{display:flex;align-items:center;gap:5px}
.legend .dot{width:9px;height:9px;border-radius:50%;display:inline-block}

.hourly-wrap{
  border-top:1px solid var(--line);
  background:var(--panel);
}
.hourly-wrap h2{
  font-size:.7rem;
  letter-spacing:.14em;
  color:var(--mute);
  padding:16px 20px 8px;
  font-weight:600;
}
.hlist{
  padding:0 16px 12px;
}
.hrow{
  display:grid;
  grid-template-columns:46px 28px 1fr 50px 64px;
  align-items:center;
  gap:10px;
  padding:11px 4px;
  border-bottom:1px solid var(--line);
  font-size:.92rem;
}
.hrow:last-child{border-bottom:none}
.hrow.is-now{
  background:linear-gradient(90deg, rgba(255,180,84,.14), transparent);
  border-radius:8px;
}
.hrow .t{
  color:var(--mute);
  font-variant-numeric:tabular-nums;
  font-size:.8rem;
}
.hrow.is-now .t{color:var(--accent);font-weight:700}
.hrow .ic{width:24px;height:24px;flex-shrink:0}
.hrow .desc{
  color:var(--mute);
  font-size:.78rem;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.hrow .temp{
  text-align:right;
  font-weight:700;
  font-variant-numeric:tabular-nums;
  font-size:.98rem;
}
.hrow .rainbar-wrap{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:3px;
}
.hrow .rainval{
  font-size:.74rem;
  font-variant-numeric:tabular-nums;
  color:var(--mute);
}
.hrow .rainval.has-rain{color:#6fc3ff;font-weight:700}
.rainbar-track{
  width:56px;
  height:5px;
  background:#232c38;
  border-radius:3px;
  overflow:hidden;
}
.rainbar-fill{
  height:100%;
  border-radius:3px;
  background:#3b8fe0;
}

.daysep{
  padding:14px 4px 6px;
  font-size:.74rem;
  color:var(--accent);
  font-weight:700;
  letter-spacing:.04em;
}

footer{
  text-align:center;
  font-size:.66rem;
  color:var(--mute);
  padding:18px 20px 0;
  opacity:.6;
}
</style>
</head>
<body>
<main>
  <div class="head">
    <div class="place">岡山県 津山市</div>
    <div class="updated" id="updatedAt">読み込み中…</div>
  </div>

  <div class="now" id="now" style="display:none">
    <svg class="icon" id="nowIcon" viewBox="0 0 24 24"></svg>
    <div class="temp" id="nowTemp">--<span>°C</span></div>
    <div class="desc" id="nowDesc"></div>
    <div class="rain" id="nowRain" style="display:none"></div>
  </div>

  <div id="status"></div>

  <div class="legend">
    <span><i class="dot" style="background:#5ab4ff"></i>寒い</span>
    <span><i class="dot" style="background:#9fd45c"></i>快適</span>
    <span><i class="dot" style="background:#ff8a5c"></i>暑い</span>
  </div>

  <div class="hourly-wrap" id="hourlyWrap" style="display:none">
    <h2>1時間ごとの予報</h2>
    <div class="hlist" id="hlist"></div>
  </div>

  <footer>データ: Open-Meteo</footer>
</main>

<script>
'use strict';

var LAT = 35.0667;
var LON = 134.0042;

function wmoInfo(code){
  var m = {
    0:['快晴','sun'],1:['晴れ','cloudsun'],2:['薄曇り','cloudsun'],3:['曇り','cloud'],
    45:['霧','fog'],48:['霧氷','fog'],
    51:['霧雨','rain'],53:['霧雨','rain'],55:['霧雨','rain'],
    56:['着氷性霧雨','rain'],57:['着氷性霧雨','rain'],
    61:['弱い雨','rain'],63:['雨','rain'],65:['強い雨','rain'],
    66:['着氷性の雨','rain'],67:['着氷性の雨','rain'],
    71:['弱い雪','snow'],73:['雪','snow'],75:['強い雪','snow'],77:['霧雪','snow'],
    80:['にわか雨','rain'],81:['にわか雨','rain'],82:['激しいにわか雨','rain'],
    85:['にわか雪','snow'],86:['にわか雪','snow'],
    95:['雷雨','storm'],96:['雷雨（雹）','storm'],99:['雷雨（雹）','storm']
  };
  return m[code] || ['不明','cloud'];
}

// 気温→色（寒い青 〜 快適緑 〜 暑い赤橙）
function tempColor(t){
  if(t <= 0) return '#5ab4ff';
  if(t <= 10) return '#6fc3ff';
  if(t <= 18) return '#7fd0c8';
  if(t <= 24) return '#9fd45c';
  if(t <= 28) return '#e8c14a';
  if(t <= 33) return '#ff8a5c';
  return '#ff5c5c';
}

// 降水量(mm/h)→強さラベルと色
function rainLevel(mm){
  if(mm <= 0) return null;
  if(mm < 1) return { label:'小雨', color:'#5ab4ff' };
  if(mm < 4) return { label:'弱い雨', color:'#3b8fe0' };
  if(mm < 10) return { label:'雨', color:'#2a6fc9' };
  if(mm < 20) return { label:'強い雨', color:'#cc5cff' };
  return { label:'激しい雨', color:'#ff4d8a' };
}

function iconSVG(kind, color){
  var s = 'stroke="' + (color||'currentColor') + '" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"';
  switch(kind){
    case 'sun':
      return '<circle cx="12" cy="12" r="4.2" ' + s + '/><g ' + s + '><line x1="12" y1="2.5" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="21.5"/><line x1="2.5" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="21.5" y2="12"/><line x1="4.9" y1="4.9" x2="6.6" y2="6.6"/><line x1="17.4" y1="17.4" x2="19.1" y2="19.1"/><line x1="4.9" y1="19.1" x2="6.6" y2="17.4"/><line x1="17.4" y1="6.6" x2="19.1" y2="4.9"/></g>';
    case 'cloudsun':
      return '<circle cx="8" cy="8" r="3.4" ' + s + '/><g ' + s + '><line x1="8" y1="2" x2="8" y2="3.3"/><line x1="2" y1="8" x2="3.3" y2="8"/><line x1="3.8" y1="3.8" x2="4.7" y2="4.7"/></g><path d="M6.5 20h11a3.5 3.5 0 0 0 .4-6.98A5 5 0 0 0 8.6 11.2 3.5 3.5 0 0 0 6.5 20z" ' + s + '/>';
    case 'cloud':
      return '<path d="M6.5 18.5h11a3.5 3.5 0 0 0 .4-6.98A5 5 0 0 0 8.6 9.7 3.5 3.5 0 0 0 6.5 18.5z" ' + s + '/>';
    case 'rain':
      return '<path d="M6.5 13h10a3.3 3.3 0 0 0 .3-6.6A4.8 4.8 0 0 0 8.4 4.5 3.3 3.3 0 0 0 6.5 13z" ' + s + '/><g ' + s + '><line x1="8" y1="16" x2="7" y2="20"/><line x1="12" y1="16" x2="11" y2="20"/><line x1="16" y1="16" x2="15" y2="20"/></g>';
    case 'snow':
      return '<path d="M6.5 12h10a3.3 3.3 0 0 0 .3-6.6A4.8 4.8 0 0 0 8.4 3.5 3.3 3.3 0 0 0 6.5 12z" ' + s + '/><g ' + s + '><line x1="8" y1="16" x2="8" y2="20.5"/><line x1="6" y1="18" x2="10" y2="18.5"/><line x1="10" y1="18" x2="6" y2="18.5"/><line x1="15" y1="16" x2="15" y2="20.5"/><line x1="13" y1="18" x2="17" y2="18.5"/><line x1="17" y1="18" x2="13" y2="18.5"/></g>';
    case 'storm':
      return '<path d="M6.5 12h10a3.3 3.3 0 0 0 .3-6.6A4.8 4.8 0 0 0 8.4 3.5 3.3 3.3 0 0 0 6.5 12z" ' + s + '/><path d="M12.5 14.5 9.5 19h3l-1.5 4 4-5.5h-3z" stroke="' + (color||'currentColor') + '" stroke-width="1.4" fill="' + (color||'currentColor') + '"/>';
    case 'fog':
      return '<g ' + s + '><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="13" x2="21" y2="13"/><line x1="3" y1="17" x2="17" y2="17"/></g>';
    default:
      return '<circle cx="12" cy="12" r="8" ' + s + '/>';
  }
}

var statusEl = document.getElementById('status');
function setStatus(msg, isErr){
  if(!msg){ statusEl.classList.remove('show'); return; }
  statusEl.textContent = msg;
  statusEl.classList.toggle('err', !!isErr);
  statusEl.classList.add('show');
}

var STORE_KEY = 'tsuyama_weather_v2';
function saveLast(payload){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(payload)); }catch(e){}
}
function loadLast(){
  try{
    var raw = localStorage.getItem(STORE_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}

function nowLabel(){
  var d = new Date();
  var p = function(n){ return String(n).padStart(2,'0'); };
  return p(d.getHours()) + ':' + p(d.getMinutes());
}

function renderNow(data){
  var c = data.current;
  var info = wmoInfo(c.weather_code);
  var t = c.temperature_2m;
  var color = tempColor(t);
  document.getElementById('nowTemp').innerHTML = Math.round(t) + '<span>°C</span>';
  document.getElementById('nowTemp').style.color = color;
  document.getElementById('nowDesc').textContent = info[0] + '（実況）';
  document.getElementById('nowIcon').innerHTML = iconSVG(info[1], color);

  var rainEl = document.getElementById('nowRain');
  var precip = c.precipitation || 0;
  var rl = rainLevel(precip);
  if(rl){
    rainEl.style.display = 'inline-flex';
    rainEl.style.background = rl.color + '26';
    rainEl.style.color = rl.color;
    rainEl.textContent = '☔ ' + rl.label + ' ' + precip.toFixed(1) + 'mm/h';
  }else{
    rainEl.style.display = 'none';
  }

  document.getElementById('now').style.display = 'block';
}

function renderHourly(data){
  var h = data.hourly;
  var nowIdx = h.time.indexOf(data.current.time);
  if(nowIdx < 0) nowIdx = 0;
  var wrap = document.getElementById('hlist');
  wrap.innerHTML = '';
  var lastDateStr = null;
  var dayNames = ['日','月','火','水','木','金','土'];
  var end = Math.min(h.time.length, nowIdx + 48);
  var maxRain = 10; // バー表示の基準上限(mm/h)

  for(var i = nowIdx; i < end; i++){
    var d = new Date(h.time[i]);
    var dateStr = d.getFullYear() + '-' + d.getMonth() + '-' + d.getDate();
    if(dateStr !== lastDateStr){
      var sep = document.createElement('div');
      sep.className = 'daysep';
      var label = (i === nowIdx) ? '今日' : (d.getMonth()+1) + '月' + d.getDate() + '日（' + dayNames[d.getDay()] + '）';
      sep.textContent = label;
      wrap.appendChild(sep);
      lastDateStr = dateStr;
    }

    var info = (i === nowIdx) ? wmoInfo(data.current.weather_code) : wmoInfo(h.weather_code[i]);
    var t = (i === nowIdx) ? data.current.temperature_2m : h.temperature_2m[i];
    var color = tempColor(t);
    var precip = (i === nowIdx) ? (data.current.precipitation || 0) : (h.precipitation[i] || 0);
    var rl = rainLevel(precip);
    var pct = Math.min(100, Math.round((precip / maxRain) * 100));

    var row = document.createElement('div');
    row.className = 'hrow' + (i === nowIdx ? ' is-now' : '');
    var hourLabel = (i === nowIdx) ? '今' : (d.getHours() + '時');

    var rainHtml;
    if(rl){
      rainHtml =
        '<div class="rainbar-wrap">' +
          '<span class="rainval has-rain">' + precip.toFixed(1) + 'mm</span>' +
          '<div class="rainbar-track"><div class="rainbar-fill" style="width:' + pct + '%;background:' + rl.color + '"></div></div>' +
        '</div>';
    }else{
      rainHtml = '<div class="rainbar-wrap"><span class="rainval">―</span></div>';
    }

    row.innerHTML =
      '<div class="t">' + hourLabel + '</div>' +
      '<svg class="ic" viewBox="0 0 24 24">' + iconSVG(info[1], color) + '</svg>' +
      '<div class="desc">' + info[0] + '</div>' +
      '<div class="temp" style="color:' + color + '">' + Math.round(t) + '°</div>' +
      rainHtml;
    wrap.appendChild(row);
  }
  document.getElementById('hourlyWrap').style.display = 'block';
}

function renderAll(data, savedAtLabel){
  renderNow(data);
  renderHourly(data);
  document.getElementById('updatedAt').textContent = savedAtLabel + ' 時点';
}

function loadWeather(opts){
  opts = opts || {};
  if(!opts.silent) setStatus('読み込み中…');

  var params = new URLSearchParams({
    latitude: LAT,
    longitude: LON,
    current: 'temperature_2m,weather_code,precipitation',
    hourly: 'temperature_2m,weather_code,precipitation',
    forecast_days: '3',
    timezone: 'Asia/Tokyo'
  });
  var url = 'https://api.open-meteo.com/v1/forecast?' + params.toString();

  fetch(url)
    .then(function(res){
      if(!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(data){
      setStatus('');
      var label = nowLabel();
      saveLast({ data: data, savedAtLabel: label });
      renderAll(data, label);
    })
    .catch(function(err){
      var last = loadLast();
      var detail = (err && err.message) ? err.message : String(err);
      if(location.protocol === 'file:'){
        detail = 'file://で直接開いているため通信がブロックされています（' + detail + '）';
      }
      if(last){
        setStatus('取得失敗: ' + detail + ' ／前回データを表示中（' + last.savedAtLabel + ' 取得）', true);
        renderAll(last.data, last.savedAtLabel);
      }else{
        setStatus('データを取得できませんでした: ' + detail, true);
      }
    });
}

if(location.protocol === 'file:'){
  setStatus('このファイルを直接開いているため天気データを取得できません。', true);
}
var last = loadLast();
if(last){
  renderAll(last.data, last.savedAtLabel);
  loadWeather({ silent:true });
}else{
  loadWeather();
}
</script>
</body>
</html>
