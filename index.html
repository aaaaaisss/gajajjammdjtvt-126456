<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>津山の天気</title>
<style>
  body{background:#10151c;color:#eef1f5;font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;padding:15px;}
  #app{max-width:400px;margin:0 auto;}
  .now{text-align:center;padding:20px 0 30px;}
  .row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid #1f2733;font-size:1rem;}
  .row:last-child{border-bottom:none;}
  .day-label{margin:25px 0 10px;font-weight:bold;color:#7c8a9a;font-size:0.85rem;border-left:3px solid #3b8fe0;padding-left:8px;}
  .icon-wrap{flex:1;display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>
<div id="app">読み込み中...</div>

<script>
const LAT = 35.0667, LON = 134.0042;

// ① 外部画像を読み込まず、SVG（ベクター図形）を描画して通信量を削減
function getSvg(c) {
  const sun = '<circle cx="12" cy="12" r="5" fill="#ffca28"/><path d="M12 3v2m0 14v2m9-9h-2M5 12H3m13.4 6.4-1.4-1.4M6 6 4.6 4.6m13.4 0-1.4 1.4M6 18l-1.4 1.4" stroke="#ffca28" stroke-width="2" stroke-linecap="round"/>';
  const cloud = '<path d="M17 18a4 4 0 000-8c-.2 0-.3 0-.5.1A6 6 0 005 11.5 4 4 0 005 19h12z" fill="#a0aab5"/>';
  const rain = cloud + '<path d="M10 19l-1 3m5-3l-1 3" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>';
  const snow = cloud + '<path d="M12 18v4m-2-2h4m-7-1l3 3m-3 0l3-3m7-1l-3 3m3 0l-3-3" stroke="#e3f2fd" stroke-width="1.5" stroke-linecap="round"/>';
  const thunder = cloud + '<path d="M13 14l-4 4h3l-2 5 6-6h-3l2-3z" fill="#ffca28"/>';
  
  let inner = cloud;
  if(c<=1) inner = sun;
  else if(c==2) inner = sun + '<path d="M18 16a3 3 0 000-6 4.5 4.5 0 00-8.5-1 3 3 0 000 6h8z" fill="#a0aab5" opacity="0.9"/>';
  else if(c<=3 || c==45 || c==48) inner = cloud;
  else if(c<=67 || (c>=80 && c<=82)) inner = rain;
  else if(c<=77 || c==85 || c==86) inner = snow;
  else if(c>=95) inner = thunder;
  return `<svg viewBox="0 0 24 24" width="28" height="28" style="display:block">${inner}</svg>`;
}

// ② 暑さを色で直感的に表現
function getTempHtml(t) {
  let c = '#fff';
  if(t>=35) c='#ff4b4b';      // 猛暑: 赤
  else if(t>=30) c='#ff8c00'; // 真夏: オレンジ
  else if(t>=25) c='#ffca28'; // 夏日: 黄色
  else if(t>=20) c='#a0d829'; // 快適: 黄緑
  else if(t>=15) c='#4caf50'; // 涼しい: 緑
  else if(t>=10) c='#00bcd4'; // 肌寒い: 水色
  else if(t>=5) c='#2196f3';  // 寒い: 青
  else c='#7c4dff';           // 極寒: 紫
  return `<span style="color:${c};font-weight:bold;display:inline-block;width:35px;text-align:right;">${Math.round(t)}°</span>`;
}

// ③ 雨の強さを「背景バーの長さ」と「色」で直感的に表現
function getRainHtml(r) {
  if(!r || r === 0) return `<div style="width:55px;text-align:right;color:#455263;font-size:0.9rem;">0.0mm</div>`;
  // 10mmをバーの最大幅(100%)として計算
  const w = Math.min((r / 10) * 100, 100);
  // 雨が強い(3mm以上)場合はバーと文字を濃くする
  const bg = r >= 3 ? 'rgba(65,137,230,0.5)' : 'rgba(65,137,230,0.2)';
  const color = r >= 3 ? '#66b3ff' : '#3b8fe0';
  return `<div style="width:55px;text-align:right;position:relative;color:${color};font-weight:bold;font-size:0.9rem;border-radius:3px;overflow:hidden;">
    <div style="position:absolute;top:0;bottom:0;right:0;width:${w}%;background:${bg};"></div>
    <span style="position:relative;z-index:1;padding-right:2px;">${r.toFixed(1)}mm</span>
  </div>`;
}

async function load(){
  try {
    // APIからのデータ取得範囲を絞り、通信量を最小化
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,weather_code,precipitation&hourly=temperature_2m,weather_code,precipitation&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=Asia/Tokyo&forecast_days=3`);
    if(!res.ok) throw new Error('通信エラー');
    const d = await res.json(), c = d.current, h = d.hourly, dy = d.daily;

    // 実況（現在）
    let html = `<div class="now">
      <div style="color:#7c8a9a;margin-bottom:10px;font-size:0.9rem;">津山市の現在の天気</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:15px;">
        <div style="transform:scale(2);">${getSvg(c.weather_code)}</div>
        <div style="font-size:4rem;font-weight:bold;line-height:1;margin-left:20px;">${getTempHtml(c.temperature_2m)}</div>
      </div>
      <div style="margin-top:20px;">${c.precipitation > 0 ? getRainHtml(c.precipitation) : ''}</div>
    </div>
    <div class="day-label">12時間ごとの予報</div>`;

    // 1時間ごとの予報
    let n = h.time.findIndex(t => t >= c.time);
    if(n < 0) n = 0;
    for(let j = n + 1; j < Math.min(n + 13, h.time.length); j++){
      let dt = new Date(h.time[j]);
      html += `<div class="row">
        <span style="width:45px;color:#a0aab5;">${dt.getHours()}時</span>
        <span class="icon-wrap">${getSvg(h.weather_code[j])}</span>
        ${getTempHtml(h.temperature_2m[j])}
        <span style="margin-left:15px;">${getRainHtml(h.precipitation[j] || 0)}</span>
      </div>`;
    }

    // 明日・明後日の予報
    html += `<div class="day-label">明日・明後日の予報</div>`;
    for(let j = 1; j < dy.time.length; j++){
       let dt = new Date(dy.time[j]);
       html += `<div class="row">
        <span style="width:45px;color:#a0aab5;">${dt.getMonth()+1}/${dt.getDate()}</span>
        <span class="icon-wrap">${getSvg(dy.weather_code[j])}</span>
        <div style="width:75px;text-align:right;">
          ${getTempHtml(dy.temperature_2m_max[j])} <span style="color:#556475;font-size:0.8rem;">/</span> ${getTempHtml(dy.temperature_2m_min[j])}
        </div>
        <span style="margin-left:15px;">${getRainHtml(dy.precipitation_sum[j] || 0)}</span>
      </div>`;
    }
    document.getElementById('app').innerHTML = html;
  } catch(e) {
    document.getElementById('app').innerHTML = `<div style="color:#ff4b4b;padding:20px;">取得エラー: ${e.message}</div>`;
  }
}
load();
</script>
</body>
</html>
