<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>津山の天気</title>
<style>
  body{background:#10151c;color:#eef1f5;font-family:sans-serif;margin:0;padding:15px;}
  #app{max-width:400px;margin:0 auto;}
  .now{text-align:center;padding:10px 0 30px;}
  .now .t{font-size:4.5rem;font-weight:bold;color:#ffb454;line-height:1;}
  .row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #2a3340;font-size:0.95rem;}
  .row:last-child{border-bottom:none;}
  .day{margin-top:20px;font-weight:bold;color:#7c8a9a;font-size:0.85rem;}
  .red{color:#ff5c5c;} .blue{color:#6fc3ff;} .rain{color:#3b8fe0;font-weight:bold;}
</style>
</head>
<body>
<div id="app">読み込み中...</div>

<script>
const LAT = 35.0667, LON = 134.0042;
// 天気コードと絵文字の対応表
const wc = {0:'☀️快晴',1:'🌤晴れ',2:'⛅薄曇',3:'☁️曇り',45:'🌫霧',48:'🌫霧氷',51:'🌧霧雨',53:'🌧霧雨',55:'🌧霧雨',56:'🌧着氷霧雨',57:'🌧着氷霧雨',61:'☔弱雨',63:'☔雨',65:'☔強雨',66:'☔着氷雨',67:'☔着氷雨',71:'🌨弱雪',73:'❄️雪',75:'❄️強雪',77:'🌨霧雪',80:'☔にわか雨',81:'☔にわか雨',82:'☔激雨',85:'🌨にわか雪',86:'❄️雪',95:'🌩雷雨',96:'🌩雷雹',99:'🌩雷雹'};
function getIcon(c){ return wc[c] || '☁️不明'; }

async function load(){
  try {
    // forecast_hours=24 を削除し、forecast_days=2 で確実に明日までの毎時データを取得するように修正
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,weather_code,precipitation&hourly=temperature_2m,weather_code,precipitation&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=Asia/Tokyo&forecast_days=3`);
    if(!res.ok) throw new Error('通信エラー');
    const d = await res.json(), c = d.current, h = d.hourly, dy = d.daily;

    // ① 実況（今）
    let html = `<div class="now">
      <div style="color:#7c8a9a;margin-bottom:5px;">岡山県 津山市</div>
      <div class="t">${Math.round(c.temperature_2m)}<span style="font-size:2rem;color:#7c8a9a">°C</span></div>
      <div style="margin-top:10px">${getIcon(c.weather_code)} ${c.precipitation > 0 ? `<span class="rain">☔${c.precipitation}mm/h</span>` : ''}</div>
    </div>
    <div class="day">12時間ごとの予報</div>`;

    // ② 1時間ごと（12時間分）
    let n = h.time.findIndex(t => t >= c.time);
    if(n < 0) n = 0;
    for(let j = n + 1; j < Math.min(n + 13, h.time.length); j++){
      let dt = new Date(h.time[j]);
      let r = h.precipitation[j] || 0;
      html += `<div class="row">
        <span style="width:40px">${dt.getHours()}時</span>
        <span style="flex:1">${getIcon(h.weather_code[j])}</span>
        <span style="width:40px;text-align:right">${Math.round(h.temperature_2m[j])}°</span>
        <span style="width:50px;text-align:right" class="${r>0?'rain':''}">${r>0 ? r.toFixed(1)+'mm' : '―'}</span>
      </div>`;
    }

    // ③ 明日・明後日
    html += `<div class="day">明日・明後日の予報</div>`;
    for(let j = 1; j < dy.time.length; j++){
       let dt = new Date(dy.time[j]);
       let r = dy.precipitation_sum[j] || 0;
       html += `<div class="row">
        <span style="width:45px">${dt.getMonth()+1}/${dt.getDate()}</span>
        <span style="flex:1">${getIcon(dy.weather_code[j])}</span>
        <span style="width:70px;text-align:right"><span class="red">${Math.round(dy.temperature_2m_max[j])}°</span> / <span class="blue">${Math.round(dy.temperature_2m_min[j])}°</span></span>
        <span style="width:50px;text-align:right" class="${r>0?'rain':''}">${r>0 ? r.toFixed(1)+'mm' : '―'}</span>
      </div>`;
    }
    
    // 一括で画面に反映
    document.getElementById('app').innerHTML = html;
  } catch(e) {
    document.getElementById('app').innerHTML = `<div style="color:#ff5c5c;padding:20px;">取得エラー: ${e.message}</div>`;
  }
}
load();
</script>
</body>
</html>
